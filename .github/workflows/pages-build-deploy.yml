name: Build and Deploy GitHub Pages

env:
  # Set to "false" to keep minification but skip JS obfuscation (useful for debugging).
  OBFUSCATE_JS: "true"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required permissions for deploying to GitHub Pages from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid overlapping deployments for the same branch.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # No paid tools are required for this workflow.
      # Cost model:
      # - Public repo: GitHub-hosted runner minutes are generally free.
      # - Private repo: uses your Actions minutes quota; paid only if quota is exceeded.
      - name: Build static output into dist/
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          rsync -a --exclude '.git' --exclude '.github' ./ dist/

          # Minify and obfuscate JavaScript files in-place in dist/.
          # Behavior:
          # - Bundles each file individually
          # - Minifies output
          # - Applies lightweight obfuscation for casual deterrence
          find dist -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            npx --yes esbuild "$file" --minify --bundle --format=iife --outfile="$file"

            if [ "${OBFUSCATE_JS}" = "true" ]; then
              npx --yes javascript-obfuscator "$file" \
                --output "$file" \
                --compact true \
                --control-flow-flattening false \
                --dead-code-injection false \
                --string-array true \
                --string-array-threshold 0.8
            fi
          done

          # Minify CSS files in-place in dist/.
          find dist -type f -name "*.css" -print0 | while IFS= read -r -d '' file; do
            npx --yes esbuild "$file" --minify --loader:.css=css --outfile="$file"
          done

          # Remove source maps if any are generated in future changes.
          find dist -type f -name "*.map" -delete

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
