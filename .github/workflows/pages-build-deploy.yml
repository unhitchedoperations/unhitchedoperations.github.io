name: Build and Deploy Pages (No External Actions)

env:
  # Set to "false" to keep minification but skip JS obfuscation (useful for debugging).
  OBFUSCATE_JS: "true"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      obfuscate_js:
        description: "Manual override for JS obfuscation (default false for debugging)"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # This workflow intentionally avoids all external `uses:` actions so it works
      # when org policy allows only actions from repositories you own.
      #
      # Cost model:
      # - No paid tools are required by this workflow.
      # - Public repo: GitHub-hosted runner minutes are generally free.
      # - Private repo: uses your Actions minutes quota; paid only if quota is exceeded.
      - name: Build site and deploy to docs/ folder
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          INPUT_OBFUSCATE_JS: ${{ github.event.inputs.obfuscate_js }}
        run: |
          set -euo pipefail

          # Guardrail:
          # - Automatic production deploys (push on main): always obfuscate.
          # - Manual runs (workflow_dispatch): default to non-obfuscated debug output.
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            OBFUSCATE_EFFECTIVE="true"
          else
            OBFUSCATE_EFFECTIVE="${INPUT_OBFUSCATE_JS:-false}"
          fi

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${REPO_URL}" src

          mkdir -p docs
          rsync -a --exclude '.git' --exclude '.github' --exclude 'docs' src/ docs/

          # Minify and obfuscate JavaScript files in-place in docs/.
          # Behavior:
          # - Bundles each file individually
          # - Minifies output
          # - Applies lightweight obfuscation for casual deterrence
          find docs -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            npx --yes esbuild "$file" --minify --bundle --format=iife --outfile="$file"

            if [ "${OBFUSCATE_EFFECTIVE}" = "true" ]; then
              npx --yes javascript-obfuscator "$file" \
                --output "$file" \
                --compact true \
                --control-flow-flattening false \
                --dead-code-injection false \
                --string-array true \
                --string-array-threshold 0.8
            fi
          done

          # Minify CSS files in-place in docs/.
          find docs -type f -name "*.css" -print0 | while IFS= read -r -d '' file; do
            npx --yes esbuild "$file" --minify --loader:.css=css --outfile="$file"
          done

          # Remove source maps if any are generated in future changes.
          find docs -type f -name "*.map" -delete
          touch docs/.nojekyll

          cd src
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rsync -a --delete --exclude '.git' ../docs/ ./docs/
          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Build: Rebuild docs/ ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"

          git push origin main
