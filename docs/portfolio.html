ocument.createElement("div");o.className="portfolio-card",o.innerHTML=`\n            <img src="${e.image}" alt="${e.title}" class="portfolio-image">\n            <div class="portfolio-content">\n              <div class="portfolio-category">${e.category}</div>\n              <h3 class="portfolio-title">${e.title}</h3>\n              <p class="portfolio-description">${e.description}</p>\n            </div>\n          `,t.appendChild(o)})):document.getElementById("empty-state").style.display="block"}loadPortfolio()</script><script src="assets/js/main.js"></script></body></html>
