<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Portfolio | Unhitched Operations</title>
    <meta name="description" content="View our portfolio of completed dumpster rental and aggregate delivery projects. See real examples of our residential and commercial work.">
    <meta name="keywords" content="portfolio, project gallery, dumpster rental examples, aggregate delivery projects, completed work, before after">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.unhitchedoperations.com/portfolio.html">
    <meta property="og:title" content="Portfolio | Unhitched Operations">
    <meta property="og:description" content="View our portfolio of completed dumpster rental and aggregate delivery projects. See real examples of our residential and commercial work.">
    <meta property="og:image" content="https://www.unhitchedoperations.com/assets/img/website-favicon-transparent.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.unhitchedoperations.com/portfolio.html">
    <meta property="twitter:title" content="Portfolio | Unhitched Operations">
    <meta property="twitter:description" content="View our portfolio of completed dumpster rental and aggregate delivery projects. See real examples of our residential and commercial work.">
    <meta property="twitter:image" content="https://www.unhitchedoperations.com/assets/img/website-favicon-transparent.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.unhitchedoperations.com/portfolio.html">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/website-favicon-transparent.png">
    <link rel="apple-touch-icon" href="assets/img/website-favicon-transparent.png">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#1ABC9C">
    
    <link href="assets/css/main.css" rel="stylesheet">
    <style>
      .portfolio-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
      }

      .portfolio-header h1 {
        font-size: 2rem;
        margin: 0;
      }

      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }

      .portfolio-card {
        border-radius: 0.75rem;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .portfolio-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      }

      .portfolio-image {
        width: 100%;
        height: 220px;
        object-fit: cover;
        background: #f0f0f0;
      }

      .portfolio-content {
        padding: 1.5rem;
      }

      .portfolio-category {
        font-size: 0.85rem;
        color: var(--brand-teal, #1abc9c);
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .portfolio-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0.5rem 0;
      }

      .portfolio-description {
        font-size: 0.95rem;
        color: #666;
        margin: 0;
      }

      .portfolio-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      .filter-btn {
        padding: 0.5rem 1rem;
        background: #f0f0f0;
        border: 2px solid transparent;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .filter-btn:hover {
        background: #e0e0e0;
      }

      .filter-btn.active {
        background: var(--brand-accent, #CC5C00);
        color: white;
        border-color: var(--brand-accent, #CC5C00);
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: #999;
      }

      .empty-state p {
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div class="top-banner">
      💬 Text - <a href="sms:316-688-2500">316-688-2500</a> to get scheduled.
    </div>
    <div class="page">
      <header class="site-header">
        <a href="index.html" style="text-decoration: none; color: inherit;">
          <div class="logo">
            <img src="assets/img/website-favicon-transparent.png" alt="Unhitched Operations" class="logo-mark">
            <span>Unhitched Operations</span>
          </div>
        </a>
        <nav class="nav">
          <a href="index.html" class="nav-btn">← Home</a>
        </nav>
      </header>

      <main>
        <section class="hero" style="margin-bottom: 3rem; padding-bottom: 0;">
          <div class="hero-main">
            <h1 class="hero-title">Our Portfolio</h1>
            <p class="hero-sub">
              See some of our selected examples of projects we've completed for satisfied customers across the area.
            </p>
          </div>
        </section>

        <section class="portfolio-grid-section">
          <div class="portfolio-filter" id="filter-buttons"></div>
          <div class="portfolio-grid" id="portfolio-grid"></div>
          <div class="empty-state" id="empty-state" style="display: none;">
            <p>No portfolio items yet. Check back soon!</p>
          </div>
        </section>
      </main>

      <footer style="text-align: center; margin-top: 4rem; padding: 2rem 0; border-top: 1px solid #eee; color: #999; font-size: 0.9rem;">
        <p>&copy; 2026 Unhitched Operations. All rights reserved.</p>
      </footer>
    </div>

    <script>
      let allItems = [];
      let selectedCategory = 'All';

      async function loadPortfolio() {
        try {
          const res = await fetch('data/portfolio.json');
          const data = await res.json();
          allItems = data.portfolioItems || [];

          // Build filter buttons
          const filterContainer = document.getElementById('filter-buttons');
          const allBtn = document.createElement('button');
          allBtn.textContent = 'All';
          allBtn.className = 'filter-btn active';
          allBtn.onclick = () => filterCategory('All');
          filterContainer.appendChild(allBtn);

          (data.categories || []).forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = 'filter-btn';
            btn.onclick = () => filterCategory(cat);
            filterContainer.appendChild(btn);
          });

          renderPortfolio();
        } catch (err) {
          console.error('Failed to load portfolio:', err);
          document.getElementById('empty-state').style.display = 'block';
        }
      }

      function filterCategory(category) {
        selectedCategory = category;

        // Update active button
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent === category);
        });

        renderPortfolio();
      }

      function renderPortfolio() {
        const grid = document.getElementById('portfolio-grid');
        const items = selectedCategory === 'All'
          ? allItems
          : allItems.filter(item => item.category === selectedCategory);

        grid.innerHTML = '';

        if (items.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }

        document.getElementById('empty-state').style.display = 'none';

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'portfolio-card';
          card.innerHTML = `
            <img src="${item.image}" alt="${item.title}" class="portfolio-image">
            <div class="portfolio-content">
              <div class="portfolio-category">${item.category}</div>
              <h3 class="portfolio-title">${item.title}</h3>
              <p class="portfolio-description">${item.description}</p>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      loadPortfolio();
    </script>
  </body>
</html>
